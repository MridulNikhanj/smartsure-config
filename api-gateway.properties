server.port=8080
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

jwt.secret=${JWT_SECRET}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=admin-claims
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/admin/claims/**

spring.cloud.gateway.server.webflux.routes[2].id=admin-policies
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/admin/policies/**

spring.cloud.gateway.server.webflux.routes[3].id=admin-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.server.webflux.routes[4].id=policy-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://POLICY-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/policies/**

spring.cloud.gateway.server.webflux.routes[5].id=claims-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://CLAIMS-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/claims/**

spring.cloud.gateway.server.webflux.routes[6].id=auth-service-openapi
spring.cloud.gateway.server.webflux.routes[6].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/v3/api-docs/auth-service
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/v3/api-docs/auth-service, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[7].id=policy-service-openapi
spring.cloud.gateway.server.webflux.routes[7].uri=lb://POLICY-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/v3/api-docs/policy-service
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/v3/api-docs/policy-service, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[8].id=claims-service-openapi
spring.cloud.gateway.server.webflux.routes[8].uri=lb://CLAIMS-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/v3/api-docs/claims-service
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/v3/api-docs/claims-service, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[9].id=admin-service-openapi
spring.cloud.gateway.server.webflux.routes[9].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/v3/api-docs/admin-service
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/v3/api-docs/admin-service, /v3/api-docs

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth-service

springdoc.swagger-ui.urls[1].name=Policy Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/policy-service

springdoc.swagger-ui.urls[2].name=Claims Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/claims-service

springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/admin-service

springdoc.swagger-ui.urls-primary-name=Auth Service
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

management.endpoints.web.exposure.include=*

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

