server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

jwt.secret=${JWT_SECRET}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=policy-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://POLICY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/policies/**

spring.cloud.gateway.server.webflux.routes[2].id=claims-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://CLAIMS-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/claims/**

spring.cloud.gateway.server.webflux.routes[3].id=admin-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/admin/**

management.endpoints.web.exposure.include=*

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG


